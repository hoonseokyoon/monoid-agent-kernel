name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: python -m pip install ruff
      - name: Lint
        run: ruff check src tests

  fast-contract:
    name: Fast + contract (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev,openai]"
      - name: Run deterministic parallel shard
        run: python -m pytest -q -n 4 -m "(unit or contract) and not serial" --durations=25

  integration:
    name: Serial integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev,openai]"
      - name: Run bounded serial shard
        run: python -m pytest -q -m "(integration or serial) and not live" --durations=25

  coverage:
    name: Coverage floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev,openai]"
      - name: Measure parallel unit and contract coverage
        run: >
          python -m pytest -q -n 4 -m "(unit or contract) and not serial"
          --cov=monoid_agent_kernel
          --cov=native_agent_runner
          --cov-report=
      - name: Append serial integration coverage and enforce floor
        run: >
          python -m pytest -q -m "(integration or serial) and not live"
          --cov=monoid_agent_kernel
          --cov=native_agent_runner
          --cov-append
          --cov-report=term-missing:skip-covered
          --cov-report=xml
          --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  platform-smoke:
    name: ${{ matrix.os }} smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run platform-sensitive smoke
        run: >
          python -m pytest -q
          tests/test_workspace_paths_properties.py
          tests/test_workspace_contract.py
          tests/test_file_lock.py
          tests/test_spec_serialization.py

  dbos-reference:
    name: Experimental DBOS activation recovery (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install experimental DBOS profile
        run: python -m pip install -e ".[dev,reference-dbos]"
      - name: Run DBOS process-restart and idempotency acceptance tests
        run: >-
          python -m pytest -q
          tests/test_backend_dbos_run.py
          tests/test_backend_dbos_control.py
          tests/test_dbos_control_models.py
          tests/test_dbos_run_driver.py
          tests/test_dbos_run_models.py
          --durations=10

  install-smoke:
    name: Install smoke (${{ matrix.install }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - install: minimal
            requirement: "."
          - install: all-extras
            requirement: ".[openai,http-async,otel-export,mcp,reference-dbos]"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install "${{ matrix.requirement }}"
      - name: Import public and optional surfaces
        run: >
          python -c "import monoid_agent_kernel;
          import monoid_agent_kernel.providers.openai;
          import monoid_agent_kernel.providers.gateway;
          import monoid_agent_kernel.observability.otel;
          import monoid_agent_kernel.mcp;
          import monoid_agent_kernel.reference.dbos"
      - name: Verify optional dependencies
        if: matrix.install == 'all-extras'
        run: python -c "import dbos, openai, httpx, opentelemetry.sdk"
      - name: Run minimal Studio acceptance from installed package
        if: matrix.install == 'minimal'
        working-directory: ${{ runner.temp }}
        run: |
          python -c "import importlib.util; assert importlib.util.find_spec('httpx') is None"
          monoid studio accept \
            --workspace "${{ runner.temp }}/studio-workspace" \
            --run-root "${{ runner.temp }}/studio-runs"
