<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Studio</title>
<style>
  :root {
    --bg: #0f1117; --panel: #171a23; --border: #262b38; --text: #e6e8ee;
    --muted: #8b91a0; --accent: #6ea8fe; --user: #1f3b66; --assistant: #1c2230;
    --warn: #f0b35b; --err: #f08a8a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--text);
    font: 14px/1.55 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: var(--panel); }
  header .title { font-weight: 600; }
  header .ws { color: var(--muted); font-size: 12px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; max-width: 50vw; }
  .badge { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted); }
  .badge.offline { color: var(--warn); border-color: var(--warn); }
  #body { flex: 1; display: flex; min-height: 0; }
  #sidebar { width: 240px; min-width: 240px; overflow: auto; border-right: 1px solid var(--border);
    background: var(--panel); padding: 10px 12px; }
  .side-title { font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); margin-bottom: 8px; }
  #tree { list-style: none; margin: 0; padding: 0; font-size: 12.5px; }
  #tree li { padding: 2px 4px; border-radius: 6px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  #tree li.dir { color: var(--muted); }
  #tree li.file { color: var(--text); cursor: pointer; }
  #tree li.file:hover { background: var(--assistant); }
  #jobs { list-style: none; margin: 0; padding: 0; font-size: 12px; }
  #jobs li { padding: 3px 4px; border-radius: 6px; cursor: pointer; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  #jobs li:hover { background: var(--assistant); }
  #jobs .st { color: var(--muted); }
  #jobs li.done .st { color: #7fd18b; }
  #jobs li.failed .st { color: var(--err); }
  #log { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex;
    flex-direction: column; gap: 12px; }
  #proposal { width: 380px; min-width: 320px; border-left: 1px solid var(--border);
    background: var(--panel); padding: 12px 14px; overflow: auto; display: flex;
    flex-direction: column; gap: 10px; }
  #proposal[hidden] { display: none; }
  #proposal-files { font-size: 12.5px; color: var(--muted); }
  #proposal-files .f { color: var(--text); }
  #diff { flex: 1; margin: 0; overflow: auto; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
    white-space: pre; }
  #diff .add { color: #7fd18b; }
  #diff .del { color: #f08a8a; }
  #diff .meta { color: var(--muted); }
  #apply { background: #7fd18b; color: #06210c; border: 0; border-radius: 8px; padding: 9px 14px;
    font-weight: 600; cursor: pointer; }
  #apply:disabled { opacity: .5; cursor: default; }
  #apply-status { font-size: 12.5px; color: var(--muted); }
  .msg { max-width: 760px; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap;
    word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--user); }
  .msg.assistant { align-self: flex-start; background: var(--assistant);
    border: 1px solid var(--border); }
  .msg.error { align-self: flex-start; background: #2a1c1c; border: 1px solid var(--err);
    color: var(--err); }
  .msg.error .retry { margin-top: 8px; background: var(--err); color: #1c0606; border: 0;
    border-radius: 8px; padding: 6px 14px; font-weight: 600; cursor: pointer; }
  .msg.error .retry:disabled { opacity: .5; cursor: default; }
  .msg strong { color: var(--accent); }
  .msg blockquote { margin: 6px 0; padding-left: 10px; border-left: 3px solid var(--border);
    color: var(--muted); }
  .activity { align-self: center; color: var(--muted); font-size: 12px; font-style: italic; }
  .typing { align-self: flex-start; color: var(--muted); font-size: 13px; }
  .hitl { align-self: stretch; max-width: 760px; background: #2a2410; border: 1px solid var(--warn);
    border-radius: 12px; padding: 12px 14px; }
  .hitl .q { margin-bottom: 10px; white-space: pre-wrap; }
  .hitl .q b { color: var(--warn); }
  .hitl .opts { display: flex; gap: 8px; flex-wrap: wrap; }
  .hitl button { background: var(--warn); color: #1c1606; border: 0; border-radius: 8px;
    padding: 7px 14px; font-weight: 600; cursor: pointer; }
  .hitl button.deny { background: transparent; color: var(--warn); border: 1px solid var(--warn); }
  .hitl button:disabled { opacity: .5; cursor: default; }
  .hitl.answered { opacity: .65; }
  .hitl .answered-note { color: var(--muted); font-size: 12px; margin-top: 8px; }
  footer { border-top: 1px solid var(--border); background: var(--panel); padding: 12px 16px; }
  #setup { display: flex; align-items: center; gap: 14px; max-width: 900px; margin: 0 auto 8px;
    font-size: 12px; color: var(--muted); flex-wrap: wrap; }
  #setup label { display: flex; align-items: center; gap: 6px; }
  #setup input, #setup select { background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; font: inherit; }
  #setup input { width: 150px; }
  #setup input:disabled { opacity: .5; }
  #setup-status { color: var(--accent); }
  form { display: flex; gap: 10px; max-width: 900px; margin: 0 auto; }
  textarea { flex: 1; resize: none; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font: inherit;
    min-height: 44px; max-height: 160px; }
  button { background: var(--accent); color: #0b0e14; border: 0; border-radius: 10px;
    padding: 0 18px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  #stop { background: var(--err); color: #1c0606; }
  .usage { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  #plan { list-style: none; padding: 0; margin: 0; font-size: 13px; }
  #plan li { padding: 3px 0; color: var(--muted); display: flex; gap: 6px; align-items: baseline; }
  #plan li .st { flex: none; width: 14px; text-align: center; }
  #plan li.done { color: var(--text); }
  #plan li.done .step { text-decoration: line-through; opacity: .7; }
  #plan li.active { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <span class="title">Agent Studio</span>
    <span class="ws" id="ws">…</span>
    <span class="badge" id="provider">…</span>
    <span class="usage" id="usage" title="tokens this run"></span>
    <a href="/settings" title="Settings" style="color:var(--muted);text-decoration:none;font-size:16px;margin-left:6px">⚙</a>
  </header>
  <div id="body">
    <aside id="sidebar">
      <div class="side-title">Files</div>
      <ul id="tree"></ul>
      <div class="side-title" id="plan-title" style="margin-top:14px" hidden>Plan</div>
      <ol id="plan" hidden></ol>
      <div class="side-title" style="margin-top:14px">Jobs</div>
      <ul id="jobs"></ul>
    </aside>
    <div id="log"></div>
    <aside id="proposal" hidden>
      <div class="side-title">Proposed changes</div>
      <div id="proposal-files"></div>
      <pre id="diff"></pre>
      <button id="apply" type="button">Approve &amp; apply</button>
      <div id="apply-status"></div>
    </aside>
  </div>
  <footer>
    <div id="setup">
      <label>Model <input id="model" type="text" spellcheck="false" autocomplete="off" /></label>
      <label>Effort <select id="effort"></select></label>
      <span id="setup-status"></span>
    </div>
    <form id="form">
      <textarea id="input" placeholder="Message the agent…  (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button id="send" type="submit">Send</button>
      <button id="stop" type="button" hidden>Stop</button>
    </form>
  </footer>

<script>
const log = document.getElementById("log");
const form = document.getElementById("form");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const stopBtn = document.getElementById("stop");
const usageEl = document.getElementById("usage");
let runId = null;
let evtSource = null;
let seenSeq = -1;
let typingEl = null;
let lastUserMessage = "";
let pendingConfigFix = false;  // a non-retryable turn.failed is awaiting a model/effort change
let generating = false;
let streamingEl = null;        // the assistant bubble currently being streamed into
let streamingText = "";

function setGenerating(on) {
  generating = on;
  stopBtn.hidden = !on;
}

async function stopRun() {
  if (!runId) return;
  setGenerating(false);
  try {
    await fetch("/api/interrupt", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ run_id: runId }),
    });
  } catch (_) {}
  // Interrupt is turn-level: the session stays alive, so the conversation continues with the
  // next message (the run is NOT terminalized). Takes effect at the next step boundary.
  activity("⏹ Stopped — the session is still open; send another message to continue.");
}
stopBtn.addEventListener("click", stopRun);

function renderMarkdown(text) {
  // minimal markdown: **bold** and > quote
  let html = text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  return html.split("\n").map(line =>
    line.startsWith("&gt; ") ? "<blockquote>" + line.slice(5) + "</blockquote>" : line
  ).join("\n");
}

function bubble(cls, text) {
  const el = document.createElement("div");
  el.className = "msg " + cls;
  el.innerHTML = renderMarkdown(text);
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  return el;
}

// Live token streaming: append model.output.delta fragments into one assistant bubble.
function appendDelta(text) {
  hideTyping();
  if (!streamingEl) { streamingEl = bubble("assistant", ""); streamingText = ""; }
  streamingText += text;
  streamingEl.innerHTML = renderMarkdown(streamingText);
  log.scrollTop = log.scrollHeight;
}
function finalizeStream(finalText) {
  if (!streamingEl) return false;
  // Prefer the authoritative assembled final_text if the turn settled with one.
  if (finalText) streamingEl.innerHTML = renderMarkdown(finalText);
  streamingEl = null; streamingText = "";
  return true;
}

function activity(text) {
  const el = document.createElement("div");
  el.className = "activity";
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement("div");
  typingEl.className = "typing";
  typingEl.textContent = "agent is thinking…";
  log.appendChild(typingEl);
  log.scrollTop = log.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function handleEvent(ev) {
  const seq = ev.seq ?? -1;
  if (seq >= 0 && seq <= seenSeq) return; // dedup across reconnects
  if (seq >= 0) seenSeq = seq;
  const type = ev.type || "";
  const data = ev.data || {};
  if (ev.studio_activity) { hideTyping(); activity(ev.studio_activity); return; }
  if (type === "proposal.ready" || type === "workspace.diff.updated" || type === "workspace.proposal.updated") {
    refreshProposal();
    return;
  }
  if (type === "task.started" && data.kind === "hitl") { hideTyping(); renderHitl(data); return; }
  if (type.indexOf("job.") === 0) { refreshJobs(); return; }
  if (type === "plan.updated") { renderPlan(data.items); return; }
  if (type === "metrics.updated") { updateUsage(data); return; }
  if (type === "turn.failed") {
    hideTyping();
    setGenerating(false);
    const msg = data.error || "the model turn failed";
    if (data.retryable) {
      activity("⚠ " + msg + " — retrying…");
      setGenerating(true);  // a transient failure is auto-retried server-side
    } else {
      // recoverable but not retryable (e.g. a config 4xx): the session stays alive; the user
      // fixes model/effort above and resends. Composer stays enabled.
      pendingConfigFix = true;
      const card = bubble("error", msg + "\n\nAdjust the model/effort above, then retry.");
      showRetry(card);
    }
    return;
  }
  if (type === "turn.interrupted") { hideTyping(); setGenerating(false); finalizeStream(""); return; }
  if (type === "model.turn.started") {
    pendingConfigFix = false; setGenerating(true);
    streamingEl = null; streamingText = "";  // a fresh turn streams into a new bubble
    showTyping();
    return;
  }
  if (type === "model.output.delta") { appendDelta(data.text || ""); return; }
  if (type === "model.turn.finished") { hideTyping(); return; }
  if (type === "turn.settled" || type === "run.finished") {
    hideTyping();
    setGenerating(false);
    if (finalizeStream(data.final_text)) return;  // a streamed bubble is already on screen
    if (data.final_text) bubble("assistant", data.final_text);
    return;
  }
  if (type === "run.awaiting_input") { setGenerating(false); return; }
  if (type === "run.failed" || type === "ModelAdapterError") {
    hideTyping();
    setGenerating(false);
    finalizeStream("");
    bubble("error", data.error || data.message || "the run failed");
    return;
  }
  if (type === "studio.stream.end") { hideTyping(); setGenerating(false); return; }
}

function updateUsage(data) {
  const i = data.input_tokens, o = data.output_tokens, t = data.total_tokens;
  if (t === undefined && i === undefined) return;
  usageEl.textContent = "↑" + (i ?? 0) + " ↓" + (o ?? 0) + " · " + (t ?? 0) + " tok";
}

const planTitle = document.getElementById("plan-title");
const planEl = document.getElementById("plan");
function renderPlan(items) {
  if (!Array.isArray(items) || items.length === 0) { planTitle.hidden = true; planEl.hidden = true; return; }
  planTitle.hidden = false; planEl.hidden = false;
  planEl.innerHTML = "";
  for (const it of items) {
    const li = document.createElement("li");
    const status = String((it && it.status) || "").toLowerCase();
    let icon = "○";
    if (status === "completed" || status === "done") { icon = "✓"; li.className = "done"; }
    else if (status === "in_progress" || status === "active" || status === "running") { icon = "▸"; li.className = "active"; }
    const st = document.createElement("span"); st.className = "st"; st.textContent = icon;
    const step = document.createElement("span"); step.className = "step";
    step.textContent = String((it && (it.step || it.title || it.name)) || "");
    li.appendChild(st); li.appendChild(step);
    planEl.appendChild(li);
  }
}

const proposalEl = document.getElementById("proposal");
const proposalFilesEl = document.getElementById("proposal-files");
const diffEl = document.getElementById("diff");
const applyBtn = document.getElementById("apply");
const applyStatus = document.getElementById("apply-status");
let applied = false;

function renderDiff(text) {
  diffEl.innerHTML = "";
  for (const line of text.split("\n")) {
    const span = document.createElement("span");
    if (line.startsWith("+") && !line.startsWith("+++")) span.className = "add";
    else if (line.startsWith("-") && !line.startsWith("---")) span.className = "del";
    else if (line.startsWith("@@") || line.startsWith("diff ") || line.startsWith("index ")) span.className = "meta";
    span.textContent = line + "\n";
    diffEl.appendChild(span);
  }
}

async function refreshProposal() {
  if (!runId || applied) return;
  try {
    const p = await (await fetch(`/api/proposal?run_id=${encodeURIComponent(runId)}`)).json();
    if (!p.ready || !p.diff) return;
    const files = (p.changed_paths || (p.files || []).map(f => f.path) || []);
    proposalFilesEl.innerHTML = files.length
      ? "Changed: " + files.map(f => `<span class="f">${f}</span>`).join(", ")
      : "";
    renderDiff(p.diff);
    proposalEl.hidden = false;
    applyBtn.disabled = false;
    applyStatus.textContent = "";
  } catch (_) {}
}

async function applyProposal() {
  if (!runId) return;
  applyBtn.disabled = true;
  applyStatus.textContent = "Applying…";
  try {
    const res = await (await fetch("/api/apply", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ run_id: runId }),
    })).json();
    if (res.error) { applyStatus.textContent = "Error: " + res.error; applyBtn.disabled = false; return; }
    if (res.status === "conflict") {
      applyStatus.textContent = "Conflict — workspace changed since the proposal.";
      applyBtn.disabled = false;
      return;
    }
    applied = true;
    applyStatus.textContent = "Applied " + ((res.applied_paths || []).length) + " file(s).";
    activity("Applied proposed changes to the workspace");
    loadTree();
  } catch (err) {
    applyStatus.textContent = "Error: " + err;
    applyBtn.disabled = false;
  }
}
applyBtn.addEventListener("click", applyProposal);

async function refreshJobs() {
  if (!runId) return;
  const ul = document.getElementById("jobs");
  try {
    const body = await (await fetch(`/api/jobs?run_id=${encodeURIComponent(runId)}`)).json();
    const jobs = body.jobs || [];
    ul.innerHTML = "";
    for (const j of jobs) {
      const li = document.createElement("li");
      const status = j.status || "";
      if (status === "exited" || status === "finished") li.className = "done";
      else if (status === "failed" || status === "timed_out") li.className = "failed";
      const short = (j.job_id || "").slice(0, 12);
      const code = (j.exit_code !== null && j.exit_code !== undefined) ? " (" + j.exit_code + ")" : "";
      li.innerHTML = short + ' <span class="st">' + status + code + "</span>";
      li.title = j.command_preview || j.job_id || "";
      li.addEventListener("click", () => showJobLogs(j.job_id));
      ul.appendChild(li);
    }
  } catch (_) {}
}

async function showJobLogs(jobId) {
  try {
    const body = await (await fetch(
      `/api/job-logs?run_id=${encodeURIComponent(runId)}&job_id=${encodeURIComponent(jobId)}`
    )).json();
    const block = document.createElement("pre");
    block.className = "msg assistant";
    block.style.font = "12px ui-monospace, Menlo, Consolas, monospace";
    block.textContent = "$ job " + jobId.slice(0, 12) + " (stdout)\n" + (body.content || "(no output)");
    log.appendChild(block);
    log.scrollTop = log.scrollHeight;
  } catch (_) {}
}

function renderHitl(data) {
  const taskId = data.task_id;
  const choices = (Array.isArray(data.choices) && data.choices.length) ? data.choices : ["Approve", "Deny"];
  const card = document.createElement("div");
  card.className = "hitl";
  const q = document.createElement("div");
  q.className = "q";
  const prompt = (data.prompt || "Approve this action?")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  q.innerHTML = "<b>The agent needs your approval</b>\n" + prompt;
  card.appendChild(q);
  const opts = document.createElement("div");
  opts.className = "opts";
  choices.forEach((choice, idx) => {
    const b = document.createElement("button");
    if (choices.length === 2 && idx === 1) b.className = "deny";
    b.textContent = choice;
    b.addEventListener("click", () => answerHitl(taskId, choice, card));
    opts.appendChild(b);
  });
  card.appendChild(opts);
  log.appendChild(card);
  log.scrollTop = log.scrollHeight;
}

async function answerHitl(taskId, answer, card) {
  card.querySelectorAll("button").forEach((b) => (b.disabled = true));
  try {
    const res = await fetch("/api/hitl", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ run_id: runId, task_id: taskId, answer }),
    });
    const body = await res.json();
    if (body.error) throw new Error(body.error);
    card.classList.add("answered");
    const note = document.createElement("div");
    note.className = "answered-note";
    note.textContent = "You answered: " + answer;
    card.appendChild(note);
  } catch (err) {
    card.querySelectorAll("button").forEach((b) => (b.disabled = false));
    activity("Failed to send approval: " + err);
  }
}

function openStream() {
  if (evtSource) evtSource.close();
  seenSeq = -1;
  evtSource = new EventSource(`/api/events?run_id=${encodeURIComponent(runId)}&from=0`);
  evtSource.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch (_) {} };
  evtSource.onerror = () => { /* EventSource auto-reconnects */ };
}

function showRetry(afterCard) {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "retry";
  btn.textContent = "Retry";
  btn.addEventListener("click", () => {
    btn.disabled = true;
    if (lastUserMessage) send(lastUserMessage);
  });
  afterCard.appendChild(document.createElement("br"));
  afterCard.appendChild(btn);
}

async function send(message) {
  lastUserMessage = message;
  pendingConfigFix = false;
  bubble("user", message);
  sendBtn.disabled = true;
  try {
    const res = await fetch("/api/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ run_id: runId, message }),
    });
    const body = await res.json();
    if (body.error) { bubble("error", body.error); return; }
    if (!runId && body.run_id) { runId = body.run_id; openStream(); }
    setGenerating(true);  // show Stop until the turn settles/parks
  } catch (err) {
    bubble("error", String(err));
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;
  input.value = "";
  send(message);
});
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});

async function loadTree() {
  const tree = document.getElementById("tree");
  try {
    const body = await (await fetch("/api/files")).json();
    tree.innerHTML = "";
    if (!body.files || !body.files.length) {
      const li = document.createElement("li");
      li.className = "dir";
      li.textContent = "(empty workspace)";
      tree.appendChild(li);
      return;
    }
    for (const entry of body.files) {
      const li = document.createElement("li");
      li.className = entry.is_dir ? "dir" : "file";
      const depth = (entry.path.match(/\//g) || []).length;
      const name = entry.path.split("/").pop();
      li.style.paddingLeft = (4 + depth * 12) + "px";
      li.textContent = entry.is_dir ? name + "/" : name;
      li.title = entry.path;
      if (!entry.is_dir) {
        li.addEventListener("click", () => {
          input.value = (input.value ? input.value + " " : "") + entry.path;
          input.focus();
        });
      }
      tree.appendChild(li);
    }
  } catch (_) {}
}

async function saveSetting(payload, label) {
  const st = document.getElementById("setup-status");
  st.textContent = "saving…";
  try {
    const r = await (await fetch("/api/settings", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload),
    })).json();
    if (r.error) { st.textContent = "error: " + r.error; return; }
    st.textContent = label + " updated" + (r.applied_runs ? " · hot-swapped " + r.applied_runs : "");
    setTimeout(() => { st.textContent = ""; }, 2500);
    // If a turn just failed on a config issue, the fix is in — auto-resend the last message.
    if (pendingConfigFix && lastUserMessage) {
      pendingConfigFix = false;
      send(lastUserMessage);
    }
  } catch (_) { st.textContent = "error"; }
}

async function loadSetup() {
  try {
    const s = await (await fetch("/api/settings")).json();
    const modelEl = document.getElementById("model");
    const effortEl = document.getElementById("effort");
    modelEl.value = s.model || "";
    if (s.offline) { modelEl.disabled = true; modelEl.title = "offline echo model — ignored"; }
    effortEl.innerHTML = "";
    for (const e of (s.efforts || [])) {
      const opt = document.createElement("option");
      opt.value = e; opt.textContent = e;
      if (e === s.effort) opt.selected = true;
      effortEl.appendChild(opt);
    }
    modelEl.addEventListener("change", () => saveSetting({ model: modelEl.value }, "Model"));
    effortEl.addEventListener("change", () => saveSetting({ effort: effortEl.value }, "Effort"));
  } catch (_) {}
}

(async function init() {
  try {
    const cfg = await (await fetch("/api/config")).json();
    document.getElementById("ws").textContent = cfg.workspace;
    document.getElementById("ws").title = cfg.workspace;
    const badge = document.getElementById("provider");
    badge.textContent = cfg.offline ? "offline · echo model" : cfg.provider;
    if (cfg.offline) badge.classList.add("offline");
  } catch (_) {}
  loadTree();
  loadSetup();
})();
</script>
</body>
</html>
